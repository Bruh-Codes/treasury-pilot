specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: YieldPilotVault
    network: arbitrum-sepolia
    source:
      address: "0x23d80c8c231d7bf671ac54cd5854728535063254"
      abi: YieldPilotVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Deposit
        - Withdraw
        - StrategyAllocated
        - StrategyRecalled
        - StrategyWhitelisted
        - WithdrawalQueueUpdated
      abis:
        - name: YieldPilotVault
          file: ./abis/YieldPilotVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: StrategyAllocated(indexed address,uint256)
          handler: handleStrategyAllocated
        - event: StrategyRecalled(indexed address,uint256)
          handler: handleStrategyRecalled
        - event: StrategyWhitelisted(indexed address)
          handler: handleStrategyWhitelisted
        - event: WithdrawalQueueUpdated(address[])
          handler: handleWithdrawalQueueUpdated
      file: ./src/mapping.ts
